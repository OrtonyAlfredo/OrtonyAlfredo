<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços NYN</title>
    <link rel="stylesheet" href="../assets/css/base/reset.css">
    <link rel="stylesheet" href="../assets/css/base/variables.css">
    <link rel="stylesheet" href="../assets/css/base/typography.css">
    <link rel="stylesheet" href="../assets/css/layout/grid.css">
    <link rel="stylesheet" href="../assets/css/layout/header.css">
    <link rel="stylesheet" href="../assets/css/layout/footer.css">
    <link rel="stylesheet" href="../assets/css/components/cards.css">
    <link rel="stylesheet" href="../assets/css/components/buttons.css">
    <link rel="stylesheet" href="../assets/css/pages/servicos.css">
</head>
<body>
    <div id="header"></div>

    <section class="servicos-pagina">
        <h2>Nossos Serviços</h2>
        <div class="cards-container">
            <!-- Serviços -->
            <div class="card">
                <img src="../assets/images/icons/logistica.png" alt="Logística">
                <h3>Logística</h3>
                <p>Entrega rápida e eficiente de produtos e materiais.</p>
                <a href="pedido.html" class="btn-primary">Solicitar Serviço</a>
            </div>
            <div class="card">
                <img src="../assets/images/icons/cotaçao.png" alt="Cotação">
                <h3>Cotação</h3>
                <p>Pesquisamos os melhores preços para você.</p>
                <a href="pedido.html" class="btn-primary">Solicitar Serviço</a>
            </div>
            <div class="card">
                <img src="../assets/images/icons/fornecimento.png" alt="Fornecimento">
                <h3>Fornecimento</h3>
                <p>Produtos e materiais para empresas e particulares.</p>
                <a href="pedido.html" class="btn-primary">Solicitar Serviço</a>
            </div>
            <!-- Adicione mais serviços se precisar -->
        </div>
    </section>

    <div id="footer"></div>

    
    <script>
        fetch('../components/header.html')
            .then(res => res.text())
            .then(data => document.getElementById('header').innerHTML = data);
        fetch('../components/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer').innerHTML = data);
    </script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/carinho.js"></script>
</body>
</html>
